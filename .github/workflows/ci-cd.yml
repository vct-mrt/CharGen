name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        
    - name: Build
      run: make
      
    - name: Test basic functionality
      run: |
        ./chargen 10
        ./chargen -n 8
        ./chargen -ci 12
        ./chargen -ca 15
        ./chargen -ns 20
        ./chargen --version
        ./chargen --help
        
    - name: Upload binary
      uses: actions/upload-artifact@v3
      with:
        name: chargen-binary
        path: chargen

  build-packages:
    name: Build Packages
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Install packaging tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential devscripts debhelper rpm
        
    - name: Build Debian package
      run: |
        cp -r packaging/debian .
        dpkg-buildpackage -us -uc -b
        mkdir -p dist
        mv ../*.deb dist/
        
    - name: Create source tarball
      run: |
        make clean
        cd ..
        tar czf chargen-${{ github.ref_name }}.tar.gz --exclude=.git CharGen/
        mv chargen-${{ github.ref_name }}.tar.gz CharGen/dist/
        
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.deb
          dist/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Install cppcheck
      run: sudo apt-get install -y cppcheck
      
    - name: Run cppcheck
      run: cppcheck --enable=all --suppress=missingIncludeSystem src/ include/
